server {
    listen 443 ssl;
    server_name fileshare.acme.internal;

    ssl_certificate /etc/nginx/certs/fileshare/server.crt;
    ssl_certificate_key /etc/nginx/certs/fileshare/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10G;

    location / {
        proxy_pass http://192.168.1.204:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name secret.acme.internal;

    ssl_certificate /etc/nginx/certs/secret/server.crt;
    ssl_certificate_key /etc/nginx/certs/secret/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10G;

    location / {
        proxy_pass http://192.168.1.204:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 80;
    server_name fileshare.acme.internal;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name secret.acme.internal;
    return 301 https://$host$request_uri;
}